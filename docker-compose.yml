services:
  postgres:
    image: postgres:16-alpine
    container_name: sz_postgres
    environment:
      POSTGRES_USER: sz
      POSTGRES_PASSWORD: sz_dev_password
      POSTGRES_DB: sz_dev
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sz -d sz_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
